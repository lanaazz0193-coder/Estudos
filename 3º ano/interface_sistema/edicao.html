<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edição</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <script type="module" src="./assets/js/Lib.js"></script>

</head>
<body>

    <header>
        <b-navbar></b-navbar>
    </header>

    <main>
        
        <div class="container">
            <div class="row">
                <div class="col">

                    <form>
                        <div class="mb-3">
                            <label for="" class="form-label">Nome</label>
                            <input type="" class="form-control" id="">
                        </div>
                        <div class="mb-3 ">
                            <label><input type="radio" name="experiencia" value="sim"> Aluno</label>
                        </div>
                        <div class="mb-3 ">
                            <label><input type="radio" name="experiencia" value="nao"> Administrador</label>
                        </div>
                    </form>

                    <form>
                        <div class="mt-5 mb-3">
                            <label for="email" class="form-label">E‐mail</label>
                            <input class="form-control" type="email" id="email" name="email" required>
                        </div>

                        <div class="mb-3">
                            <label for="tel">Telefone</label>
                            <input class="form-control" type="tel" id="tel" name="telefone" placeholder="(99) 99999-9999">
                        </div>

                    </form>
                    
                    <button type="submit" class="btn btn-secondary">Cadastrar</button>
                        
                </div>
            </div>
        </div>
        
    </main>

    <footer>
        <b-footer></b-footer>
    </footer>
    
</body>
</html>
