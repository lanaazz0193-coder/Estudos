<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Biblioteca</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>

  <script type="module" src="./assets/js/Lib.js"></script>

  <link rel="stylesheet" href="style.css">

</head>

<body>

  <!-- Cabeçalho -->
  <header>
    <b-navbar></b-navbar>
  </header>

  <main>

    <!-- Banner -->
    <b-banner endereco-imagem="" titulo-banner=""></b-banner>

    <!-- Cards -->
    <div style="min-height: 600px;" class="container mt-5 mb-5">
      <div class="row">

        <div class="col-4 mx-auto">
          <b-card></b-card>
        </div>
        <div class="col-4 mx-auto">
          <b-card></b-card>
        </div>
        <div class="col-4 mx-auto">
          <b-card></b-card>
        </div>
        <div class="col-4 mx-auto">
          <b-card></b-card>
        </div>
        <div class="col-4 mx-auto">
          <b-card></b-card>
        </div>
        <div class="col-4 mx-auto">
          <b-card></b-card>
        </div>

      </div>
    </div>

    <!-- Carrossel -->
    <div class="">
      <div class="row ">

        <div
          style="background-image: linear-gradient(rgba(0, 0, 0, 0.171), rgba(0, 0, 0, 0.596)), url(''); background-size: cover; background-position: center; width: 50%; height: 600px;"
          class="col-6"></div>

        <div class="col-6">
          <div id="carouselExampleCaptions" class="carousel slide">
            <div class="carousel-indicators">
              <button type="button" data-bs-target="#carouselExampleCaptions" data-bs-slide-to="0" class="active"
                aria-current="true" aria-label="Slide 1"></button>
              <button type="button" data-bs-target="#carouselExampleCaptions" data-bs-slide-to="1"
                aria-label="Slide 2"></button>
              <button type="button" data-bs-target="#carouselExampleCaptions" data-bs-slide-to="2"
                aria-label="Slide 3"></button>
            </div>
            <div class="carousel-inner">
              <div class="carousel-item active">
                <svg aria-label="Espaço reservado: Primeiro slide"
                  class="bd-placeholder-img bd-placeholder-img-lg d-block w-100" height="600"
                  preserveAspectRatio="xMidYMid slice" role="img" width="800" xmlns="http://www.w3.org/2000/svg">
                  <title>Placeholder</title>
                  <rect width="100%" height="100%" fill="#777"></rect><text x="50%" y="50%" fill="#555" dy=".3em">First
                    slide</text>
                </svg>
                <div class="carousel-caption d-none d-md-block">
                  <h5>
                    <font dir="auto" style="vertical-align: inherit;">
                      <font dir="auto" style="vertical-align: inherit;">Rótulo do primeiro slide</font>
                    </font>
                  </h5>
                  <p>
                    <font dir="auto" style="vertical-align: inherit;">
                      <font dir="auto" style="vertical-align: inherit;">Exemplo de conteúdo provisório para o primeiro
                        slide.
                      </font>
                    </font>
                  </p>
                </div>
              </div>
              <div class="carousel-item">
                <svg aria-label="Espaço reservado: Segundo slide"
                  class="bd-placeholder-img bd-placeholder-img-lg d-block w-100" height="600"
                  preserveAspectRatio="xMidYMid slice" role="img" width="800" xmlns="http://www.w3.org/2000/svg">
                  <title>Placeholder</title>
                  <rect width="100%" height="100%" fill="#666"></rect><text x="50%" y="50%" fill="#444" dy=".3em">Second
                    slide</text>
                </svg>
                <div class="carousel-caption d-none d-md-block">
                  <h5>
                    <font dir="auto" style="vertical-align: inherit;">
                      <font dir="auto" style="vertical-align: inherit;">Rótulo do segundo slide</font>
                    </font>
                  </h5>
                  <p>
                    <font dir="auto" style="vertical-align: inherit;">
                      <font dir="auto" style="vertical-align: inherit;">Exemplo de conteúdo provisório para o segundo
                        slide.
                      </font>
                    </font>
                  </p>
                </div>
              </div>
              <div class="carousel-item">
                <svg aria-label="Espaço reservado: Terceiro slide"
                  class="bd-placeholder-img bd-placeholder-img-lg d-block w-100" height="600"
                  preserveAspectRatio="xMidYMid slice" role="img" width="800" xmlns="http://www.w3.org/2000/svg">
                  <title>Placeholder</title>
                  <rect width="100%" height="100%" fill="#555"></rect><text x="50%" y="50%" fill="#333" dy=".3em">Third
                    slide</text>
                </svg>
                <div class="carousel-caption d-none d-md-block">
                  <h5>
                    <font dir="auto" style="vertical-align: inherit;">
                      <font dir="auto" style="vertical-align: inherit;">Rótulo do terceiro slide</font>
                    </font>
                  </h5>
                  <p>
                    <font dir="auto" style="vertical-align: inherit;">
                      <font dir="auto" style="vertical-align: inherit;">Exemplo de conteúdo provisório para o terceiro
                        slide.
                      </font>
                    </font>
                  </p>
                </div>
              </div>
            </div>
            <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleCaptions"
              data-bs-slide="prev">
              <span class="carousel-control-prev-icon" aria-hidden="true"></span>
              <span class="visually-hidden">
                <font dir="auto" style="vertical-align: inherit;">
                  <font dir="auto" style="vertical-align: inherit;">Anterior</font>
                </font>
              </span>
            </button>
            <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleCaptions"
              data-bs-slide="next">
              <span class="carousel-control-next-icon" aria-hidden="true"></span>
              <span class="visually-hidden">
                <font dir="auto" style="vertical-align: inherit;">
                  <font dir="auto" style="vertical-align: inherit;">Próximo</font>
                </font>
              </span>
            </button>
          </div>
        </div>


      </div>
    </div>

  </main>

  <!-- Rodapé -->
  <footer>
    <b-footer></b-footer>
  </footer>

</body>

</html>
