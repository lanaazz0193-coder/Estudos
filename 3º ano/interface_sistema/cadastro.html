<!DOCTYPE html>
<html lang="pt-br">

<head>

    <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"

    <script type="module" src="./assets/js/Lib.js"></script>

    <link rel="stylesheet" href="./assets/css/style.css">

    <!-- fontes -->

    <!-- f-playfair -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Alien+Block&family=Ballet:opsz@16..72&family=Fira+Code:wght@300..700&family=Monsieur+La+Doulaise&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Prata&family=Rouge+Script&display=swap"

</head>

<body>

    <header>
        <b-navbar></b-navbar>
    </header>

    <main class="c-azul f-cinza-claro"> 


        <!-- Primeira parte-->
        <div class="">
            <div class="row">

                <!-- Primeira parte -->
                <div class="col-6 p-5 mt-5">

                    <form>
                        <div class="mb-3">
                            <label for="" class="form-label">Nome</label>
                            <input type="" class="form-control" id="">
                        </div>
                        <div class="mb-3 ">
                            <label><input type="radio" name="experiencia" value="sim"> Aluno</label>
                        </div>
                        <div class="mb-3 ">
                            <label><input type="radio" name="experiencia" value="nao"> Administrador</label>
                        </div>
                    </form>

                    <form>
                        <div class="mt-5 mb-3">
                            <label for="email" class="form-label">E‐mail</label>
                            <input class="form-control" type="email" id="email" name="email" required>
                        </div>
                        <div class="mb-3">
                            <label for="tel">Telefone</label>
                            <input class="form-control" type="tel" id="tel" name="telefone"
                                placeholder="(99) 99999-9999">
                        </div>
                    </form>



                </div>

                <!-- Segunda parte IMAGEM -->
                <div class="col-6"
                    style="background-image: url('./assets/img/biblioteca.jpg'); background-size: cover; background-position: center; min-height: 100vh;">
                </div>

            </div>
        </div>

        </div>
        </div>





    </main>

    <footer>
        <b-footer></b-footer>
    </footer>

</body>
