<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Número Secreto</title>
    
    <style>
        @font-face 
        {
            font-family: 'Silkscreen';
            src: url('Silkscreen-Regular.ttf');
        }
        body 
            {
                background: linear-gradient(to left,
                   
                  #5e7332 7%,
                  #274001 40%,
                  #142601 60%,
                  #000 100%
                );
                    height: 100vh;    
            }
            main 
            {
                align-items: center;
                justify-content: center;
            }
            p 
            {
                color: aliceblue;
            }
            footer 
            {
                color: goldenrod;
                font-size: medium;
                position: relative;
                top: -2.2%;
                left: -0.8%;
            }
            .oi 
            {
                font-size: 105px;
                font-weight: bold;
                text-align: center;
                position: absolute;
                top: 46%;
                left: 41%;
            }
            .ola 
            {
                font-size: 29.5px;
                text-align: center;
                position: absolute;
                font-weight: bolder;
                top: 65.1%;
                left: 43%;
            }
            h1 
            {
                white-space: nowrap;
                font-size: 245%;
                font-family: 'Silkscreen', 'Times New Roman', Times, serif;
                font-weight: bolder;
                color: #ffffff;
                position: absolute;
                left: 41.7%;
                top: 13.8%;
            }
            .wumpus 
            {
                transform: scaleX(1);
                position: absolute;
                top: -7.5%;
                left: 14%; 
            }
            .trofeu 
            {
                position: absolute;
                top: 44%;
                left: 58%;
                transform: translate(-50%, -50%);
            }
            .quadrado
            {
                background: linear-gradient(to left ,
                 #5e7332 3%,
                  #274001 40%,
                  #142601 60%,
                  #000 100%
                );
                width: 1050px;
                height: 600px;
                background-color: #3f5313;
                position:absolute;
                top: 55%;
                left: 50%;
                transform: translate(-50%, -50%);
                border-radius: 26px;
                opacity: 0.6;
                box-shadow: 0 5px 15px rgba(0,0,0,0.4);
            }
            .rodape
                { 
                    position: relative;
                    top: 99.6%;
                    left: 0.5%;
                    font-size: 14px;
                    font-family: 'Silkscreen';
                }
            .fundo
            {
               width: 100vw; 
               height: 100vh;
               object-fit: cover;
               opacity: 9%;
            }
          
       </style>
</head>

<body>
    
    <header>
        <h1>Jogo do número secreto</h1>
    </header>
    
    <main>

        <img class="fundo" src="sistema-codigo-binario.jpg" alt="Código Binário">
        <div class="quadrado"></div>
        <img width="705px" height="860px" src="robo_espacial.png" class="wumpus" alt="wumpus">
        <img width="290px" src="trofeu_verde_neon.png" class="trofeu" alt="troféu dourado">
        <p class="oi">Você <span style="color: #76db0a;">acertou!</span></p>
        <p class="ola">Você descobriu o número secreto</p>
       </main>
    
         <footer>
            <small class="rodape">Criado por Davi Coelho Almeida</small>
         </footer>

         <script src="app.js" defer></script>

</body>

</html>
